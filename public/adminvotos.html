<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin DB | Votación SmartHome</title>
  <!-- Google Font: Outfit -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- PANTALLA: ADMINISTRADOR DE BASE DE DATOS -->
  <div id="admin-screen" class="screen active">
    <!-- Cabecera -->
    <header class="app-header">
      <div class="header-container">
        <div class="brand">
          <div class="brand-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/><path d="m9 12 2 2 4-4"/></svg>
          </div>
          <span class="brand-title">SmartHome DB Manager</span>
        </div>
        
        <div class="user-status-bar" style="position: relative;">
          <!-- Botón de Volver -->
          <a href="/votacion" class="btn btn-secondary" style="padding: 8px 16px; font-size: 0.85rem; border-radius: var(--radius-sm);">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 4px;"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
            Volver al Dashboard
          </a>

          <div class="user-info">
            <span class="user-avatar" style="background-color: #000; color: #fff;">A</span>
            <div class="user-details" style="display: block;">
              <span class="user-name">adminvotacion</span>
              <span class="user-role">Administrador Global</span>
            </div>
          </div>
        </div>
      </div>
    </header>

    <!-- Contenido Principal -->
    <main class="dashboard-main" style="max-width: 1000px;">
      <div class="card" style="padding: 24px; margin-bottom: 0;">
        
        <!-- Pestañas Administrativas -->
        <nav class="admin-tabs">
          <button class="tab-btn active" data-table="users">
            <span>Usuarios</span>
            <span class="tab-badge" id="badge-users">0</span>
          </button>
          <button class="tab-btn" data-table="product_options">
            <span>Propuestas</span>
            <span class="tab-badge" id="badge-product_options">0</span>
          </button>
          <button class="tab-btn" data-table="votes">
            <span>Votos</span>
            <span class="tab-badge" id="badge-votes">0</span>
          </button>
          <button class="tab-btn" data-table="comments">
            <span>Comentarios</span>
            <span class="tab-badge" id="badge-comments">0</span>
          </button>
        </nav>

        <!-- Barra de herramientas de la tabla -->
        <div class="table-toolbar">
          <div class="toolbar-left">
            <h2 id="active-table-title">Gestión de Usuarios</h2>
            <p id="active-table-desc">Administra el listado de miembros del equipo registrados para votar.</p>
          </div>
          <button id="add-btn" class="btn btn-primary">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            <span>Añadir Registro</span>
          </button>
        </div>

        <!-- Contenedor de la Tabla -->
        <div class="table-wrapper">
          <table class="admin-table">
            <thead>
              <tr id="table-head-row">
                <!-- Generado dinámicamente -->
              </tr>
            </thead>
            <tbody id="table-body">
              <!-- Generado dinámicamente -->
            </tbody>
          </table>
        </div>

      </div>
    </main>
  </div>

  <!-- MODAL: CREAR REGISTRO -->
  <div id="add-modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="add-modal-title">Añadir Nuevo Registro</h3>
        <button class="btn-close-modal" onclick="closeModal('add-modal')">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <form id="add-form" class="modal-form">
        <div id="add-form-fields">
          <!-- Generado dinámicamente -->
        </div>
        <div id="add-error" class="alert error hidden"></div>
        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" onclick="closeModal('add-modal')">Cancelar</button>
          <button type="submit" class="btn btn-primary">Guardar Registro</button>
        </div>
      </form>
    </div>
  </div>

  <!-- MODAL: EDITAR REGISTRO -->
  <div id="edit-modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="edit-modal-title">Editar Registro</h3>
        <button class="btn-close-modal" onclick="closeModal('edit-modal')">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <form id="edit-form" class="modal-form">
        <input type="hidden" id="edit-id-hidden">
        <div id="edit-form-fields">
          <!-- Generado dinámicamente -->
        </div>
        <div id="edit-error" class="alert error hidden"></div>
        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" onclick="closeModal('edit-modal')">Cancelar</button>
          <button type="submit" class="btn btn-primary">Guardar Cambios</button>
        </div>
      </form>
    </div>
  </div>

  <script src="js/adminvotos.js"></script>
</body>
</html>
