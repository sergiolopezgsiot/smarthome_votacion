<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceso | Encuesta de Nombres de Producto</title>
  <!-- Google Font: Outfit -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- PANTALLA: ACCESO / LOGIN -->
  <div id="login-screen" class="screen active">
    <div class="glow-bg"></div>
    <div class="auth-card">
      <div class="auth-header">
        <div class="logo-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/><path d="m9 12 2 2 4-4"/></svg>
        </div>
        <h1>Decisión del Nombre</h1>
        <p>Accede a la encuesta del equipo para elegir el nombre del producto.</p>
      </div>
      
      <form id="login-form" class="auth-form">
        <div class="form-group">
          <label for="username">Tu Nombre</label>
          <input type="text" id="username" placeholder="Ej. Carlos Mendoza" required autocomplete="off">
        </div>
        
        <div class="form-group">
          <label for="access-code">Código de Acceso</label>
          <input type="password" id="access-code" placeholder="Introduce el código del equipo" required>
        </div>
        
        <div id="login-error" class="alert error hidden">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          <span id="login-error-text">Código incorrecto.</span>
        </div>
        
        <button type="submit" class="btn btn-primary btn-block">
          <span>Ingresar a la encuesta</span>
          <svg class="arrow-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
        </button>
      </form>
    </div>
  </div>

  <script src="js/login.js"></script>
</body>
</html>
